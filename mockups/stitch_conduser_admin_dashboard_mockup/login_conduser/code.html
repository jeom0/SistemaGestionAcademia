<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Conduser - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "outline": "#6d7a6d",
                        "primary-fixed-dim": "#60df83",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#adc6ff",
                        "on-primary": "#ffffff",
                        "tertiary": "#0058be",
                        "on-secondary": "#ffffff",
                        "primary-container": "#00873f",
                        "on-tertiary-container": "#fefcff",
                        "tertiary-fixed": "#d8e2ff",
                        "secondary-fixed-dim": "#ffbb1e",
                        "surface-container-high": "#e1e8fd",
                        "primary": "#006b30",
                        "secondary": "#7c5800",
                        "surface": "#f9f9ff",
                        "on-background": "#141b2b",
                        "inverse-primary": "#60df83",
                        "on-primary-container": "#f7fff3",
                        "on-primary-fixed": "#00210a",
                        "error": "#ba1a1a",
                        "background": "#f9f9ff",
                        "surface-container-highest": "#dce2f7",
                        "on-tertiary-fixed": "#001a42",
                        "surface-tint": "#006d32",
                        "surface-bright": "#f9f9ff",
                        "on-primary-fixed-variant": "#005224",
                        "outline-variant": "#bdcabb",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#ffdea7",
                        "on-secondary-fixed-variant": "#5e4200",
                        "inverse-on-surface": "#edf0ff",
                        "primary-fixed": "#7dfc9c",
                        "inverse-surface": "#293040",
                        "on-surface-variant": "#3e4a3e",
                        "on-tertiary-fixed-variant": "#004395",
                        "surface-variant": "#dce2f7",
                        "on-secondary-container": "#6a4b00",
                        "secondary-container": "#fcb812",
                        "on-secondary-fixed": "#271900",
                        "surface-container": "#e9edff",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#141b2b",
                        "surface-dim": "#d3daef",
                        "tertiary-container": "#2170e4",
                        "surface-container-low": "#f1f3ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "space-lg": "24px",
                        "layout-margin": "24px",
                        "space-xs": "4px",
                        "unit": "4px",
                        "space-md": "16px",
                        "space-sm": "8px",
                        "space-xl": "32px",
                        "layout-gutter": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-sm": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-sm": ["11px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "headline-sm": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "display-lg": ["36px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex antialiased">
<!-- Left Column: Branded Panel -->
<div class="hidden md:flex w-1/2 relative bg-surface-container-highest overflow-hidden items-center justify-center border-r border-outline-variant">
<!-- Subtle road-curve decorations -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" preserveaspectratio="none" viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<path class="text-primary-fixed/20" d="M-10,50 Q40,90 110,30 L110,110 L-10,110 Z" fill="currentColor"></path>
<path class="text-secondary-fixed/40" d="M-10,70 Q50,40 110,80 L110,110 L-10,110 Z" fill="currentColor"></path>
<path class="text-primary/10" d="M-10,90 Q60,60 110,100 L110,110 L-10,110 Z" fill="currentColor"></path>
</svg>
<!-- Centered Logo Content -->
<div class="relative z-10 flex flex-col items-center gap-space-md">
<div class="w-24 h-24 bg-primary rounded-xl flex items-center justify-center shadow-[0_4px_6px_rgba(0,0,0,0.05)]">
<span class="material-symbols-outlined text-on-primary text-[48px]" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-surface tracking-tight">Conduser</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-xs text-center mt-space-sm">
                Plataforma integral para la gestión profesional de flotas y conductores.
            </p>
</div>
</div>
<!-- Right Column: Login Form -->
<div class="w-full md:w-1/2 flex items-center justify-center p-layout-margin relative bg-surface">
<div class="w-full max-w-sm flex flex-col items-center">
<!-- Top Avatar Icon -->
<div class="w-20 h-20 bg-surface-container-high rounded-full flex items-center justify-center mb-space-xl border border-outline-variant shadow-[0_4px_6px_rgba(0,0,0,0.05)]">
<span class="material-symbols-outlined text-outline text-[40px]">person</span>
</div>
<!-- Form Container -->
<form class="w-full flex flex-col gap-space-lg">
<!-- Input Group: Usuario -->
<div class="flex flex-col gap-space-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="username">Usuario</label>
<input class="w-full h-12 px-4 rounded-lg bg-surface-container-lowest border border-outline-variant focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 font-body-md text-body-md text-on-surface transition-all" id="username" placeholder="Ingrese su usuario" type="text"/>
</div>
<!-- Input Group: Contraseña -->
<div class="flex flex-col gap-space-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Contraseña</label>
<div class="relative w-full">
<input class="w-full h-12 pl-4 pr-12 rounded-lg bg-surface-container-lowest border border-outline-variant focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 font-body-md text-body-md text-on-surface transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 top-0 h-full px-4 flex items-center justify-center text-outline hover:text-on-surface transition-colors cursor-pointer" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-primary text-on-primary rounded-lg font-label-md text-label-md hover:bg-on-primary-fixed-variant transition-colors mt-space-sm flex items-center justify-center shadow-[0_4px_6px_rgba(0,0,0,0.05)]" type="submit">
                    Ingresar
                </button>
</form>
<!-- Recovery Link -->
<a class="mt-space-xl font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">
                Olvidé mi contraseña
            </a>
</div>
<!-- Fixed Help Icon -->
<button class="absolute bottom-layout-margin right-layout-margin w-12 h-12 bg-surface-container-lowest border border-outline-variant rounded-full flex items-center justify-center text-outline hover:text-primary hover:border-primary transition-all shadow-[0_4px_6px_rgba(0,0,0,0.05)] cursor-pointer">
<span class="material-symbols-outlined text-[24px]">help</span>
</button>
</div>
</body></html>
